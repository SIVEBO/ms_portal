spring.application.name=ms_portal
server.port=8081

spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/db_ms_portal?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
# Use 'validate' (or 'none') in production; override via JPA_DDL_AUTO env var.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
# SQL logging is off by default; enable locally with JPA_SHOW_SQL=true.
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format.sql=true
# Parameter-bind TRACE logging leaks data; keep OFF outside local debugging.
logging.level.org.hibernate.orm.jdbc.bind=${HIBERNATE_BIND_LOG:OFF}

eureka.client.service-url.defaultZone=${EUREKA_URI:http://localhost:8761/eureka/}

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

ms.tracking.url=${MS_TRACKING_URL:http://localhost:8093}
ms.clientes.url=${MS_CLIENTES_URL:http://localhost:8091}

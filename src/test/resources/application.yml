spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  cloud:
    discovery:
      enabled: false

eureka:
  client:
    enabled: false

ms:
  tracking:
    url: http://localhost:8004
  clientes:
    url: http://localhost:8009
